# yaml-language-server: $schema=../config.schema.json

http:

  apps:

    # named-only port: connections without a matching SNI must be rejected
    - listen:
        - addr: 24300
          ssl:
            cert: cert/self-signed-cert.pem
            key: cert/self-signed-key.pem
      server_names:
        - example.com
      return:
        status: 200
        response_headers:
          - [ x-app, named ]

    # named + catch-all port: the catch-all serves connections
    # without SNI or with an unmatched SNI
    - listen:
        - addr: 24301
          ssl:
            cert: cert/self-signed-cert.pem
            key: cert/self-signed-key.pem
      server_names:
        - example.com
      return:
        status: 200
        response_headers:
          - [ x-app, named ]

    - listen:
        - addr: 24301
          ssl:
            cert: cert/self-signed-cert.pem
            key: cert/self-signed-key.pem
      return:
        status: 200
        response_headers:
          - [ x-app, catch-all ]
